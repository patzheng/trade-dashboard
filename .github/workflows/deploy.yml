name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Verify environment
        run: |
          whoami
          pwd
          test -d "${{ vars.DEPLOY_PATH }}"
          test -x "${{ vars.DEPLOY_PATH }}/scripts/deploy.sh"

      - name: Deploy
        run: cd "${{ vars.DEPLOY_PATH }}" && ./scripts/deploy.sh
