name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          whoami
          pwd
          test -x ./scripts/deploy.sh

      - name: Prepare env
        run: |
          if [ -f /home/deploy/trade-dashboard/.env ]; then
            cp /home/deploy/trade-dashboard/.env .env
          elif [ -f .env ]; then
            true
          else
            echo "Missing .env. Create /home/deploy/trade-dashboard/.env on the server." >&2
            exit 1
          fi

      - name: Deploy
        run: ./scripts/deploy.sh
