name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Debug key fingerprint
        run: ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Debug target
        run: |
          echo "host=${{ vars.DEPLOY_HOST }}"
          echo "user=${{ vars.DEPLOY_USER }}"
          echo "path=${{ vars.DEPLOY_PATH }}"
          echo "port=${{ vars.DEPLOY_PORT }}"

      - name: Trigger remote deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p "${{ vars.DEPLOY_PORT || 22 }}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "cd '${{ vars.DEPLOY_PATH }}' && ./scripts/deploy.sh"
